<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>WorldMatch</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#111;display:flex;justify-content:center;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.phone{width:360px;height:720px;border-radius:34px;border:2px solid #333;overflow:hidden;background:#0d1117;position:relative;box-shadow:0 40px 100px rgba(0,0,0,.8)}
/* STATUS */
.status{background:#0d0d0d;padding:8px 16px 4px;display:flex;justify-content:space-between;align-items:center;z-index:20;position:relative}
.status span{color:#fff;font-size:11px;font-weight:500}
/* SCREENS */
.screen{position:absolute;top:38px;left:0;right:0;bottom:58px;overflow:hidden}
.screen.hidden{display:none}
/* BOTTOM NAV */
.bnav{position:absolute;bottom:0;left:0;right:0;height:58px;background:#0d0d0d;border-top:0.5px solid rgba(255,255,255,0.08);display:flex;z-index:30}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;color:#444;transition:color .2s}
.btab.on{color:#e879a0}
.btab i{font-size:22px}
.btab span{font-size:9px;font-weight:500;letter-spacing:.3px}

/* === MAP === */
#sm{background:#1a1a1a;overflow:hidden}
.map-bg{
  width:100%;height:100%;
  position:relative;overflow:hidden;
  background:
    linear-gradient(rgba(0,0,0,0.08)1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,0.08)1px,transparent 1px),
    linear-gradient(rgba(0,0,0,0.04)1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,0.04)1px,transparent 1px),
    #d4c5a0;
  background-size:60px 60px,60px 60px,20px 20px,20px 20px;
}
/* Roads */
.road{position:absolute;background:#c8a96e;border-radius:2px}
.road.h{height:5px;left:0;right:0}
.road.v{width:5px;top:0;bottom:0}
.road.thick{background:#b8906a}
.road.thick.h{height:8px}
.road.thick.v{width:8px}
/* Water */
.water{position:absolute;background:#7fb3d6;border-radius:40%}
/* Park */
.park{position:absolute;background:#8ec07c;border-radius:3px;opacity:.7}
/* Map header */
.map-header{position:absolute;top:0;left:0;right:0;padding:10px 14px;z-index:10;background:linear-gradient(rgba(13,13,13,.9) 50%,transparent)}
.search-bar{background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.15);border-radius:20px;padding:8px 14px;display:flex;align-items:center;gap:8px}
.search-bar input{background:none;border:none;outline:none;color:#fff;font-size:13px;flex:1}
.search-bar input::placeholder{color:#666}
/* Pins */
.pin{position:absolute;cursor:pointer;transform:translate(-50%,-100%);z-index:20;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5))}
.pin svg{display:block}
.pin-avatar{position:absolute;top:5px;left:50%;transform:translateX(-50%);width:22px;height:22px;border-radius:50%;object-fit:cover;overflow:hidden}
.pin:hover{transform:translate(-50%,-100%) scale(1.15)}
.pin-online{position:absolute;top:1px;right:1px;width:8px;height:8px;background:#22c55e;border-radius:50%;border:1.5px solid #fff;z-index:25}
/* Popup */
.popup-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.68);display:flex;align-items:flex-end;z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
.popup-overlay.on{opacity:1;pointer-events:all}
.popup-card{background:#1a1a2e;border-radius:20px 20px 0 0;padding:18px;width:100%}
.popup-head{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.popup-av{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #e879a0}
.popup-name{color:#fff;font-size:16px;font-weight:600}
.popup-sub{color:#aaa;font-size:11px;margin-top:2px}
.tag{background:rgba(232,121,160,.13);border:.5px solid rgba(232,121,160,.3);color:#e879a0;font-size:11px;padding:3px 9px;border-radius:10px}
.popup-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.popup-btns{display:flex;gap:9px}
.pb{flex:1;padding:10px;border-radius:11px;border:none;font-size:13px;cursor:pointer;font-weight:500}
.pb1{background:#e879a0;color:#fff}
.pb2{background:rgba(255,255,255,.07);color:#aaa}

/* === NEARBY === */
#sn{background:#0d1117;padding:12px;overflow-y:auto}
.sec-title{color:#fff;font-size:14px;font-weight:600;margin:2px 0 11px}
.ng{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.nc{background:#111;border-radius:13px;overflow:hidden;cursor:pointer;border:.5px solid rgba(255,255,255,.06)}
.ni{height:150px;position:relative;overflow:hidden}
.ni img{width:100%;height:100%;object-fit:cover}
.nol{position:absolute;top:7px;right:7px;width:8px;height:8px;background:#22c55e;border-radius:50%;border:1.5px solid #111}
.ndi{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.65);color:#fff;font-size:9px;padding:2px 6px;border-radius:7px}
.nif{padding:7px 9px 9px}
.nn{color:#fff;font-size:12px;font-weight:600}
.nc2{color:#777;font-size:10px;margin-top:2px}

/* === PROFILE === */
#sp{background:#0d1117;overflow-y:auto}
.piw{position:relative;height:360px;overflow:hidden;background:#111}
.piw img{width:100%;height:100%;object-fit:cover}
.pdts{position:absolute;top:11px;left:0;right:0;display:flex;gap:3px;justify-content:center}
.pdt{height:2.5px;flex:1;max-width:24px;background:rgba(255,255,255,.28);border-radius:2px}
.pdt.on{background:#fff}
.bk{position:absolute;top:11px;left:11px;width:30px;height:30px;background:rgba(0,0,0,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:15px;z-index:5}
.pinf{padding:14px}
.pname{color:#fff;font-size:20px;font-weight:600;display:flex;align-items:center;gap:7px}
.vf{color:#60a5fa;font-size:14px}
.pmt{color:#aaa;font-size:12px;margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.onl{color:#22c55e;display:flex;align-items:center;gap:3px}
.ptgs{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
.pbio{color:#ccc;font-size:12px;line-height:1.65;margin-top:12px}
.ar{display:flex;gap:11px;padding:14px;justify-content:center}
.ab{border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.ab:active{transform:scale(.88)}
.ask{width:52px;height:52px;background:rgba(255,255,255,.07);color:#fff;font-size:20px}
.asu{width:52px;height:52px;background:rgba(96,165,250,.13);color:#60a5fa;font-size:20px}
.alk{width:64px;height:64px;background:rgba(232,121,160,.18);color:#e879a0;font-size:24px}
</style>
</head>
<body>
<div class="phone">
  <div class="status">
    <span>9:41</span>
    <span>5G <i class="ti ti-wifi" style="font-size:12px"></i></span>
  </div>

  <!-- MAP SCREEN -->
  <div id="sm" class="screen">
    <div class="map-bg" id="mapbg">
      <!-- water bodies -->
      <div class="water" style="left:30%;top:20%;width:18%;height:12%"></div>
      <div class="water" style="left:55%;top:40%;width:22%;height:15%;border-radius:30%"></div>
      <div class="water" style="left:10%;top:60%;width:14%;height:20%;border-radius:35%"></div>
      <!-- parks -->
      <div class="park" style="left:5%;top:10%;width:12%;height:8%"></div>
      <div class="park" style="left:75%;top:55%;width:10%;height:12%"></div>
      <div class="park" style="left:40%;top:70%;width:15%;height:10%"></div>
      <!-- thick roads -->
      <div class="road h thick" style="top:18%"></div>
      <div class="road h thick" style="top:38%"></div>
      <div class="road h thick" style="top:62%"></div>
      <div class="road v thick" style="left:22%"></div>
      <div class="road v thick" style="left:55%"></div>
      <div class="road v thick" style="left:78%"></div>
      <!-- thin roads -->
      <div class="road h" style="top:10%"></div>
      <div class="road h" style="top:27%"></div>
      <div class="road h" style="top:48%"></div>
      <div class="road h" style="top:74%"></div>
      <div class="road h" style="top:85%"></div>
      <div class="road v" style="left:10%"></div>
      <div class="road v" style="left:35%"></div>
      <div class="road v" style="left:65%"></div>
      <div class="road v" style="left:88%"></div>
    </div>

    <!-- Photo pins on top -->
    <div id="pins" style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:15"></div>

    <div class="map-header">
      <div class="search-bar">
        <i class="ti ti-search" style="color:#888;font-size:14px" aria-hidden="true"></i>
        <input type="text" placeholder="Search someone...">
        <i class="ti ti-adjustments-horizontal" style="color:#e879a0;font-size:14px" aria-hidden="true"></i>
      </div>
    </div>

    <div class="popup-overlay" id="mpop">
      <div class="popup-card">
        <div class="popup-head">
          <img class="popup-av" id="pop-img" src="" alt="">
          <div>
            <div class="popup-name" id="pop-nm"></div>
            <div class="popup-sub" id="pop-sb"></div>
          </div>
        </div>
        <div class="popup-tags" id="pop-tags"></div>
        <div class="popup-btns">
          <button class="pb pb2" onclick="closePop()">Close</button>
          <button class="pb pb1" onclick="openProf()">View profile</button>
        </div>
      </div>
    </div>
  </div>

  <!-- NEARBY -->
  <div id="sn" class="screen hidden">
    <p class="sec-title">Near you</p>
    <div class="ng" id="ngrid"></div>
  </div>

  <!-- PROFILE -->
  <div id="sp" class="screen hidden">
    <div class="piw">
      <img id="p-img" src="" alt="">
      <div class="pdts" id="p-dots"></div>
      <div class="bk" onclick="goBack()"><i class="ti ti-arrow-left"></i></div>
    </div>
    <div class="pinf">
      <div class="pname">
        <span id="p-nm"></span>
        <i class="ti ti-circle-check-filled vf" aria-hidden="true"></i>
      </div>
      <div class="pmt">
        <span id="p-age"></span><span>·</span><span id="p-city"></span><span>·</span>
        <span class="onl"><i class="ti ti-circle-filled" style="font-size:7px"></i> Online</span>
      </div>
      <div class="ptgs" id="p-tags"></div>
      <div class="pbio" id="p-bio"></div>
    </div>
    <div class="ar">
      <button class="ab ask" onclick="nxt(-1)" aria-label="Skip"><i class="ti ti-x"></i></button>
      <button class="ab alk" onclick="nxt(1)" aria-label="Like"><i class="ti ti-heart"></i></button>
      <button class="ab asu" aria-label="Super"><i class="ti ti-star"></i></button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bnav">
    <div class="btab on" id="t0" onclick="sw('map',this)">
      <i class="ti ti-map-2" aria-hidden="true"></i><span>Map</span>
    </div>
    <div class="btab" id="t1" onclick="sw('nearby',this)">
      <i class="ti ti-users" aria-hidden="true"></i><span>Nearby</span>
    </div>
    <div class="btab" id="t2" onclick="sw('likes',this)">
      <i class="ti ti-heart" aria-hidden="true"></i><span>Likes</span>
    </div>
    <div class="btab" id="t3" onclick="sw('chat',this)">
      <i class="ti ti-message-circle" aria-hidden="true"></i><span>Chats</span>
    </div>
    <div class="btab" id="t4" onclick="sw('me',this)">
      <i class="ti ti-user-circle" aria-hidden="true"></i><span>Profile</span>
    </div>
  </nav>
</div>

        <path d="M20 0C9 0 0 9 0 20c0 15 20 32 20 32S40 35 40 20C40 9 31 0 20 0z" fill="#e879a0"/>
        <circle cx="20" cy="19" r="15" fill="#fff"/>
        <image href="${IMGS[g.id]}" x="6" y="4" width="28" height="30" clip-path="url(#circ${g.id]})"/>
        <circle cx="33" cy="7" r="5" fill="#22c55e" stroke="#fff" stroke-width="1.5"/>
      </svg>`;
    d.onclick=()=>showPop(g.id);
    w.appendChild(d);
  });
}

function showPop(id){
  cur=id;const g=girls[id];
  document.getElementById('pop-img').src=IMGS[id];
  document.getElementById('pop-nm').textContent=g.name+', '+g.age;
  document.getElementById('pop-sb').textContent='📍 '+g.city+' · '+g.dist+' from you';
  document.getElementById('pop-tags').innerHTML=g.tags.map(t=>'<span class="tag">'+t+'</span>').join('');
  document.getElementById('mpop').classList.add('on');
}
function closePop(){document.getElementById('mpop').classList.remove('on');}
function openProf(){closePop();loadP(cur);allHide();document.getElementById('sp').classList.remove('hidden');prev='map';}

function loadP(id){
  const g=girls[id];
  document.getElementById('p-img').src=IMGS[id];
  document.getElementById('p-nm').textContent=g.name;
  document.getElementById('p-age').textContent=g.age+' years';
  document.getElementById('p-city').textContent='📍 '+g.city;
  document.getElementById('p-bio').textContent=g.bio;
  document.getElementById('p-tags').innerHTML=g.tags.map(t=>'<span class="tag">'+t+'</span>').join('');
  document.getElementById('p-dots').innerHTML='<div class="pdt on"></div><div class="pdt"></div><div class="pdt"></div>';
}
function nxt(d){cur=(cur+d+girls.length)%girls.length;loadP(cur);}
function goBack(){allHide();document.getElementById(prev==='map'?'sm':'sn').classList.remove('hidden');}

function buildNearby(){
  document.getElementById('ngrid').innerHTML=girls.map(g=>`
    <div class="nc" onclick="onNearby(${g.id})">
      <div class="ni"><img src="${IMGS[g.id]}" alt="${g.name}"><div class="nol"></div><div class="ndi">${g.dist}</div></div>
      <div class="nif"><div class="nn">${g.name}, ${g.age}</div><div class="nc2">${g.city}</div></div>
    </div>`).join('');
}
function onNearby(id){cur=id;loadP(id);allHide();document.getElementById('sp').classList.remove('hidden');prev='nearby';}

function allHide(){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));}
function sw(name,el){
  document.querySelectorAll('.btab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');closePop();allHide();
  if(name==='map')document.getElementById('sm').classList.remove('hidden');
  else if(name==='nearby')document.getElementById('sn').classList.remove('hidden');
  else{loadP(cur);document.getElementById('sp').classList.remove('hidden');prev=name;}
}
buildPins();buildNearby();
</script>
</body>
</html>
